services:
  scheduler:
    build: .
    container_name: murder-mystery-scheduler
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_PATH: ./data/app.sqlite
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-please-change-this-secret}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-true}
    ports:
      - "${APP_PORT:-80}:3001"
    volumes:
      - ./server-data:/app/server/data
